<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    .for-light { display: block; }
    .for-dark  { display: none; }
    @media (prefers-color-scheme: dark) {
      .for-light { display: none; }
      .for-dark  { display: block; }
    }
  </style>
  <image class="for-light" href="data:image/png;base64," width="128" height="128"/>
  <image class="for-dark"  href="data:image/png;base64," width="128" height="128"/>
</svg>